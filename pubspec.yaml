name: aethera
description: A premium emotional universe for couples in long-distance relationships.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: 3.1.0

  # Navigation
  go_router: ^17.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_database: ^12.1.4
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

  # Audio
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
