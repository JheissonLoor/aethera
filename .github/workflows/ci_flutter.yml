name: CI Flutter

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      MIN_COVERAGE: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Encoding and mojibake checks
        run: dart run tool/check_mojibake.dart

      - name: Static analysis
        run: flutter analyze

      - name: Unit, widget and e2e tests with coverage
        run: flutter test --coverage test/core test/features test/shared test/e2e test/widget_test.dart

      - name: Coverage gate
        run: >
          dart run tool/check_lcov_min.dart
          --min=$MIN_COVERAGE
          --include=lib/core/services,lib/core/utils,lib/core/router,lib/core/providers,lib/shared/models,lib/shared/widgets,lib/features/universe/domain

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firebase/rules/package-lock.json

      - name: Install Firebase rules test dependencies
        working-directory: firebase/rules
        run: npm ci

      - name: Firebase rules tests
        working-directory: firebase/rules
        run: npm test

  release:
    name: Release Android Bundle
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "GOOGLE_SERVICES_JSON_B64 is required for release builds."
            exit 1
          fi
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json

      - name: Build Android App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
